<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{OG_DESCRIPTION}}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{URL}}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{TITLE}}">
  <meta name="twitter:description" content="{{OG_DESCRIPTION}}">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script>document.documentElement.classList.add('js');</script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..600&family=Archivo:ital,wght@0,300..600;1,300..500&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <script type="application/ld+json">
{{JSONLD}}
  </script>
  <style>
    /* ════════════════════════════════════════════
       TOKENS
    ════════════════════════════════════════════ */
    :root {
      --ink: #0a0d13;
      --panel: #0d1119;
      --raised: #10151f;
      --line: #1d2433;
      --line-soft: #151b28;
      --bone: #ede6d6;
      --dim: #97917e;
      --muted: #5b6070;
      --amber: #ffb454;
      --amber-dim: rgba(255, 180, 84, 0.14);
      --amber-glow: rgba(255, 180, 84, 0.08);
      --ok: #69d383;
      --ok-dim: rgba(105, 211, 131, 0.12);
      --grid: rgba(237, 230, 214, 0.028);
      --serif: 'Fraunces', Georgia, serif;
      --sans: 'Archivo', -apple-system, sans-serif;
      --mono: 'IBM Plex Mono', ui-monospace, monospace;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--line) var(--ink); }

    body {
      font-family: var(--sans);
      font-weight: 300;
      background: var(--ink);
      color: var(--bone);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection { background: var(--amber); color: var(--ink); }
    a { color: inherit; text-decoration: none; }
    a:focus-visible, button:focus-visible { outline: 1px solid var(--amber); outline-offset: 3px; }

    /* ════════════════════════════════════════════
       ATMOSPHERE — blueprint grid, glow, grain
    ════════════════════════════════════════════ */
    .atmo-grid {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: linear-gradient(180deg, #000 0%, rgba(0,0,0,.55) 60%, rgba(0,0,0,.85) 100%);
      -webkit-mask-image: linear-gradient(180deg, #000 0%, rgba(0,0,0,.55) 60%, rgba(0,0,0,.85) 100%);
    }
    .atmo-glow {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(900px 520px at 80% -8%, var(--amber-glow), transparent 62%),
        radial-gradient(700px 420px at -10% 30%, rgba(105, 211, 131, 0.04), transparent 60%);
    }
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 999; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .container { max-width: 1120px; margin: 0 auto; padding: 0 clamp(20px, 5vw, 48px); position: relative; z-index: 1; }
    section { padding: 96px 0; position: relative; }

    /* ════════════════════════════════════════════
       SECTION LABELS
    ════════════════════════════════════════════ */
    .sec-label {
      display: flex; align-items: baseline; gap: 14px; margin-bottom: 56px;
      font-family: var(--mono); font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
    }
    .sec-label .idx { color: var(--muted); }
    .sec-label .name { color: var(--amber); }
    .sec-label::after { content: ''; flex: 1; height: 1px; background: var(--line-soft); align-self: center; }

    /* ════════════════════════════════════════════
       TOP BAR
    ════════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 0; transition: background .4s var(--ease), padding .4s var(--ease);
      border-bottom: 1px solid transparent;
    }
    nav::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--amber), transparent 60%); opacity: .8; }
    nav.scrolled {
      background: rgba(10, 13, 19, 0.82); backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
      border-bottom-color: var(--line-soft); padding: 12px 0;
    }
    nav .container { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 1px; white-space: nowrap; }
    .logo .path { color: var(--muted); font-weight: 400; }
    .nav-links { display: flex; gap: 26px; list-style: none; }
    .nav-links a {
      font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--dim); transition: color .3s; position: relative;
    }
    .nav-links a:hover { color: var(--bone); }
    .nav-links a::before { content: '▸ '; color: var(--amber); opacity: 0; transition: opacity .25s; }
    .nav-links a:hover::before { opacity: 1; }
    .status-pill {
      display: inline-flex; align-items: center; gap: 8px; white-space: nowrap;
      font-family: var(--mono); font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--ok); border: 1px solid rgba(105, 211, 131, 0.25); background: var(--ok-dim);
      padding: 6px 12px; border-radius: 3px; transition: border-color .3s;
    }
    .status-pill:hover { border-color: rgba(105, 211, 131, 0.55); }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); position: relative; flex: none; }
    .dot::after {
      content: ''; position: absolute; inset: -3px; border-radius: 50%;
      border: 1px solid var(--ok); opacity: .5; animation: ping 2.2s var(--ease) infinite;
    }
    @keyframes ping { 0% { transform: scale(.5); opacity: .7; } 80%, 100% { transform: scale(1.6); opacity: 0; } }

    /* ════════════════════════════════════════════
       HERO
    ════════════════════════════════════════════ */
    #top { padding: 172px 0 64px; }
    .hero-grid { display: grid; grid-template-columns: minmax(0, 7fr) minmax(0, 5fr); gap: clamp(32px, 5vw, 72px); align-items: start; }

    .overline {
      font-family: var(--mono); font-size: 11px; letter-spacing: 3.5px; text-transform: uppercase;
      color: var(--amber); margin-bottom: 26px; display: flex; align-items: center; gap: 12px;
      opacity: 0; animation: rise .8s var(--ease) .1s forwards;
    }
    .overline::before { content: ''; width: 34px; height: 1px; background: var(--amber); }

    h1 {
      font-family: var(--serif); font-optical-sizing: auto;
      font-size: clamp(44px, 6.4vw, 84px); font-weight: 380; line-height: 1.02;
      letter-spacing: -0.01em; margin-bottom: 30px;
      opacity: 0; animation: rise .9s var(--ease) .25s forwards;
    }
    h1 em { font-style: italic; font-weight: 340; color: var(--amber); }

    .lede {
      font-size: 16.5px; color: var(--dim); line-height: 1.75; max-width: 520px; margin-bottom: 38px;
      opacity: 0; animation: rise .9s var(--ease) .4s forwards;
    }
    .lede strong { color: var(--bone); font-weight: 400; }

    .hero-actions { display: flex; gap: 14px; flex-wrap: wrap; opacity: 0; animation: rise .9s var(--ease) .55s forwards; }
    .btn {
      display: inline-flex; align-items: center; gap: 10px; padding: 13px 26px;
      font-family: var(--mono); font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase;
      border-radius: 3px; cursor: pointer; transition: all .3s var(--ease); border: 1px solid transparent;
    }
    .btn-amber { background: var(--amber); color: var(--ink); font-weight: 500; }
    .btn-amber:hover { transform: translateY(-2px); box-shadow: 0 10px 34px var(--amber-dim); }
    .btn-ghost { border-color: var(--line); color: var(--dim); }
    .btn-ghost:hover { border-color: var(--dim); color: var(--bone); transform: translateY(-2px); }

    /* ── Deploy log panel ── */
    .deploylog {
      position: relative; background: var(--panel); border: 1px solid var(--line);
      padding: 26px 26px 20px; margin-top: 14px;
      opacity: 0; animation: rise 1s var(--ease) .65s forwards;
    }
    .deploylog::before, .deploylog::after {
      content: ''; position: absolute; width: 14px; height: 14px; border-color: var(--amber); border-style: solid;
    }
    .deploylog::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .deploylog::after { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .log-head {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px;
      font-family: var(--mono); font-size: 10.5px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted);
    }
    .log-head .live { display: inline-flex; align-items: center; gap: 7px; color: var(--ok); }

    .log-rows { list-style: none; display: flex; flex-direction: column; }
    .log-rows li {
      display: flex; align-items: baseline; gap: 10px;
      font-family: var(--mono); font-size: 12.5px; padding: 9px 0;
      border-bottom: 1px solid var(--line-soft);
      opacity: 0; animation: rise .6s var(--ease) forwards;
    }
    .log-rows li:last-child { border-bottom: none; }
    .log-rows time { color: var(--muted); flex: none; font-size: 11px; }
    .log-rows .what { color: var(--bone); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .log-rows .leader { flex: 1; border-bottom: 1px dotted var(--line); transform: translateY(-4px); min-width: 12px; }
    .log-rows .st { flex: none; font-size: 10.5px; letter-spacing: 1px; }
    .st-ok { color: var(--ok); }
    .st-amber { color: var(--amber); }
    @keyframes blinkSoft { 50% { opacity: .35; } }

    .log-prompt {
      margin-top: 14px; font-family: var(--mono); font-size: 12.5px; color: var(--muted);
      display: flex; align-items: center; gap: 8px;
      opacity: 0; animation: rise .6s var(--ease) {{LOG_PROMPT_DELAY}}s forwards;
    }
    .caret { display: inline-block; width: 8px; height: 15px; background: var(--amber); animation: blinkSoft 1.1s steps(2, start) infinite; }

    /* ════════════════════════════════════════════
       PROOF STRIP
    ════════════════════════════════════════════ */
    .proof { border-top: 1px solid var(--line-soft); border-bottom: 1px solid var(--line-soft); padding: 22px 0; }
    .proof-row { display: flex; flex-wrap: wrap; gap: 14px 0; align-items: center; }
    .proof-item {
      font-family: var(--mono); font-size: 12px; color: var(--dim); letter-spacing: .5px;
      display: inline-flex; align-items: center;
    }
    .proof-item b { color: var(--bone); font-weight: 500; margin-right: 6px; }
    .proof-item .cmd { color: var(--amber); }
    .proof-item + .proof-item::before { content: '/'; color: var(--line); margin: 0 22px; }

    /* ════════════════════════════════════════════
       WORK ROWS + CASE FILES
    ════════════════════════════════════════════ */
    .work-row {
      display: grid; grid-template-columns: 150px 1fr; gap: clamp(20px, 4vw, 56px);
      padding: 52px 0; border-top: 1px solid var(--line-soft); position: relative;
    }
    .work-row:last-child { border-bottom: 1px solid var(--line-soft); }

    .work-num {
      font-family: var(--serif); font-style: italic; font-size: 58px; font-weight: 300; line-height: 1;
      color: transparent; -webkit-text-stroke: 1px var(--muted); transition: all .45s var(--ease);
    }
    .work-row:hover .work-num { color: var(--amber); -webkit-text-stroke: 1px var(--amber); }

    .work-meta { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; align-items: flex-start; }

    .badge {
      font-family: var(--mono); font-size: 9.5px; letter-spacing: 1.8px; text-transform: uppercase;
      padding: 5px 10px; border-radius: 2px; display: inline-flex; align-items: center; gap: 7px; white-space: nowrap;
    }
    .badge .bdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex: none; }
    .badge-oss { color: var(--amber); background: var(--amber-dim); }
    .badge-prod { color: var(--ok); background: var(--ok-dim); }
    .badge-research { color: var(--bone); border: 1px solid var(--line); }
    .badge-private { color: var(--muted); border: 1px dashed var(--line); }

    .work-year { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }

    .work-body h3 {
      font-family: var(--serif); font-size: clamp(24px, 2.6vw, 31px); font-weight: 420; line-height: 1.18;
      margin-bottom: 6px; letter-spacing: -0.005em; transition: color .3s;
    }
    .work-body h3 .sub { color: var(--dim); font-style: italic; font-weight: 340; }
    .work-row:hover .work-body h3 { color: var(--amber); }
    .work-row:hover .work-body h3 .sub { color: var(--bone); }

    .work-desc { font-size: 15px; color: var(--dim); line-height: 1.75; max-width: 660px; margin-top: 12px; }
    .work-desc strong { color: var(--bone); font-weight: 400; }

    .work-proof {
      margin-top: 18px; font-family: var(--mono); font-size: 12px; color: var(--dim);
      line-height: 1.9; letter-spacing: .2px;
    }
    .work-proof::before { content: '▸ '; color: var(--amber); }

    .work-foot { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    .chip {
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px;
      padding: 6px 13px; border-radius: 2px; border: 1px solid var(--line);
      color: var(--dim); transition: all .3s; display: inline-flex; align-items: center; gap: 6px;
    }
    a.chip { color: var(--amber); border-color: rgba(255, 180, 84, 0.3); }
    a.chip:hover { background: var(--amber-dim); border-color: var(--amber); transform: translateY(-1px); }
    .chip-static { border-style: dashed; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-left: auto; }
    .tags span { font-family: var(--mono); font-size: 10.5px; color: var(--muted); padding: 6px 0 6px 12px; position: relative; }
    .tags span:not(:first-child)::before { content: '·'; position: absolute; left: 2px; color: var(--line); }
    .work-foot .tags:only-child { margin-left: 0; }

    /* ── Experience org blocks + case files ── */
    .sec-intro { font-size: 15.5px; color: var(--dim); line-height: 1.75; max-width: 740px; margin: -24px 0 14px; }
    .sec-intro strong { color: var(--bone); font-weight: 400; }
    .sec-intro em { color: var(--muted); }
    .org-head { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; margin: 34px 0 4px; scroll-margin-top: 90px; }
    .org-head.later { margin-top: 72px; }
    .org-name { font-family: var(--serif); font-size: 26px; font-weight: 420; }
    .org-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: 1px; }
    .org-sub { font-size: 13.5px; color: var(--muted); margin-bottom: 4px; max-width: 740px; }
    .case-cols { display: grid; grid-template-columns: minmax(0, 5fr) minmax(0, 7fr); gap: clamp(20px, 3.5vw, 44px); margin-top: 18px; }
    .case-label { font-family: var(--mono); font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .case-label::before { content: '▸ '; color: var(--amber); }
    .case-problem { border-left: 2px solid var(--amber-dim); padding-left: 18px; }
    .case-problem p { font-size: 14.5px; font-style: italic; color: var(--dim); line-height: 1.7; }
    .case-shipped p { font-size: 14.5px; color: var(--dim); line-height: 1.7; }
    .case-shipped strong { color: var(--bone); font-weight: 400; }
    .case-more { margin-top: 44px; font-size: 14px; color: var(--muted); font-style: italic; max-width: 740px; }
    .case-more b, .case-more strong { color: var(--dim); font-weight: 400; font-style: normal; }
    @media (max-width: 800px) { .case-cols { grid-template-columns: 1fr; gap: 16px; } }

    /* ════════════════════════════════════════════
       RESEARCH
    ════════════════════════════════════════════ */
    .pub-list { display: flex; flex-direction: column; }
    .pub {
      display: grid; grid-template-columns: 110px 1fr auto; gap: 24px; align-items: baseline;
      padding: 24px 0; border-top: 1px solid var(--line-soft); transition: padding-left .3s var(--ease);
    }
    .pub:last-child { border-bottom: 1px solid var(--line-soft); }
    a.pub:hover { padding-left: 10px; }
    a.pub:hover h4 { color: var(--amber); }
    .pub-year { font-family: var(--mono); font-size: 11.5px; color: var(--muted); letter-spacing: 1px; }
    .pub h4 { font-family: var(--serif); font-size: 19px; font-weight: 420; line-height: 1.35; transition: color .3s; }
    .pub .venue { display: block; font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 6px; letter-spacing: .4px; }
    .pub-arrow { font-family: var(--mono); font-size: 13px; color: var(--muted); }
    .research-note { margin-top: 28px; font-size: 14px; color: var(--muted); font-style: italic; max-width: 680px; }
    .research-note b, .research-note strong { color: var(--dim); font-weight: 400; font-style: normal; }

    /* ════════════════════════════════════════════
       WRITING
    ════════════════════════════════════════════ */
    .writing-col { max-width: 680px; }
    .col-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
    .col-head h3 { font-family: var(--serif); font-size: 26px; font-weight: 420; }
    .col-head a { font-family: var(--mono); font-size: 11px; color: var(--amber); letter-spacing: 1px; }
    .col-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
    .post-list { list-style: none; }
    .post-list li { border-top: 1px solid var(--line-soft); }
    .post-list li:last-child { border-bottom: 1px solid var(--line-soft); }
    .post-list a { display: flex; align-items: baseline; gap: 12px; padding: 14px 2px; font-size: 14.5px; color: var(--dim); transition: color .3s, padding-left .3s var(--ease); }
    .post-list a::before { content: '▸'; font-family: var(--mono); font-size: 11px; color: var(--muted); transition: color .3s; }
    .post-list a:hover { color: var(--bone); padding-left: 8px; }
    .post-list a:hover::before { color: var(--amber); }

    /* ════════════════════════════════════════════
       STACK
    ════════════════════════════════════════════ */
    .stack-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1px; background: var(--line-soft); border: 1px solid var(--line-soft); }
    .stack-cell { background: var(--ink); padding: 30px; }
    .stack-cell h4 {
      font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase;
      color: var(--amber); margin-bottom: 18px; display: flex; align-items: center; gap: 10px;
    }
    .stack-cell h4 .n { color: var(--muted); font-weight: 400; }
    .stack-items { display: flex; flex-wrap: wrap; gap: 7px; }
    .stack-items span {
      font-family: var(--mono); font-size: 11.5px; color: var(--dim);
      border: 1px solid var(--line-soft); padding: 6px 11px; border-radius: 2px; transition: all .25s;
    }
    .stack-items span:hover { color: var(--bone); border-color: var(--dim); }

    /* ════════════════════════════════════════════
       CONTACT + FOOTER
    ════════════════════════════════════════════ */
    #contact { padding-bottom: 72px; }
    .contact-grid { display: grid; grid-template-columns: minmax(0, 6fr) minmax(0, 5fr); gap: clamp(32px, 5vw, 72px); align-items: start; }
    .contact-grid h2 { font-family: var(--serif); font-size: clamp(36px, 4.4vw, 58px); font-weight: 400; line-height: 1.05; margin-bottom: 22px; }
    .contact-grid h2 em { font-style: italic; color: var(--amber); }
    .contact-grid .pitch { font-size: 15.5px; color: var(--dim); line-height: 1.75; max-width: 480px; }
    .contact-list { list-style: none; display: flex; flex-direction: column; margin-top: 6px; }
    .contact-list a {
      display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
      padding: 17px 4px; border-top: 1px solid var(--line-soft);
      transition: padding-left .3s var(--ease), background .3s;
    }
    .contact-list li:last-child a { border-bottom: 1px solid var(--line-soft); }
    .contact-list a:hover { padding-left: 12px; }
    .contact-list .k { font-family: var(--mono); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); transition: color .3s; }
    .contact-list a:hover .k { color: var(--amber); }
    .contact-list .v { font-size: 14.5px; color: var(--dim); transition: color .3s; }
    .contact-list a:hover .v { color: var(--bone); }

    footer { border-top: 1px solid var(--line-soft); padding: 26px 0; }
    footer .container { display: flex; justify-content: space-between; align-items: center; gap: 16px; flex-wrap: wrap; }
    footer p { font-family: var(--mono); font-size: 10.5px; color: var(--muted); letter-spacing: .8px; }
    footer .ok-txt { color: var(--ok); }

    /* ════════════════════════════════════════════
       MOTION
    ════════════════════════════════════════════ */
    @keyframes rise { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    /* Reveal state only applies when JS is running — content stays visible for no-JS readers */
    .js .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s var(--ease), transform .7s var(--ease); }
    .js .reveal.visible { opacity: 1; transform: translateY(0); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
      .overline, h1, .lede, .hero-actions, .deploylog, .log-rows li, .log-prompt, .reveal { opacity: 1 !important; transform: none !important; }
      html { scroll-behavior: auto; }
    }

    /* ════════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════════ */
    @media (max-width: 960px) {
      .logo .path { display: none; }
      .nav-links { gap: 14px; }
      .nav-links a { font-size: 10.5px; letter-spacing: 1.2px; }
      .hero-grid, .contact-grid { grid-template-columns: 1fr; }
      .work-row { grid-template-columns: 1fr; gap: 18px; padding: 40px 0; }
      .work-num { font-size: 44px; }
      .work-meta { flex-direction: row; align-items: center; flex-wrap: wrap; margin-top: 8px; }
      .stack-grid { grid-template-columns: 1fr; }
      #top { padding-top: 148px; }
    }
    @media (max-width: 680px) {
      .nav-links { display: none; }
      .pub { grid-template-columns: 1fr; gap: 6px; }
      .pub-arrow { display: none; }
      .tags { display: none; }
      section { padding: 68px 0; }
      .proof-item + .proof-item::before { margin: 0 12px; }
    }
  </style>
</head>
<body>

  <div class="atmo-grid" aria-hidden="true"></div>
  <div class="atmo-glow" aria-hidden="true"></div>

  <!-- ═══════════ TOP BAR ═══════════ -->
  <nav id="navbar" aria-label="Main navigation">
    <div class="container">
{{NAV}}
    </div>
  </nav>

  <!-- ═══════════ HERO ═══════════ -->
  <header id="top">
    <div class="container">
      <div class="hero-grid">
{{HERO}}
        <aside class="deploylog" aria-label="Current deployment status">
          <div class="log-head">
            <span>deploy log</span>
            <span class="live"><span class="dot" aria-hidden="true"></span>live</span>
          </div>
          <ol class="log-rows">
{{DEPLOY_LOG}}
          </ol>
          <div class="log-prompt" aria-hidden="true">$ <span class="caret"></span></div>
        </aside>
      </div>
    </div>
  </header>

  <!-- ═══════════ PROOF STRIP ═══════════ -->
  <div class="proof reveal">
    <div class="container">
      <div class="proof-row">
{{PROOF}}
      </div>
    </div>
  </div>

{{EXPERIENCE}}

{{PROJECTS}}

{{RESEARCH}}

{{WRITING}}

{{STACK}}

{{CONTACT}}

  <!-- ═══════════ FOOTER ═══════════ -->
  <footer>
    <div class="container">
{{FOOTER}}
    </div>
  </footer>

  <!-- ═══════════ SCRIPTS ═══════════ -->
  <script>
    // ── Nav scroll state ──
    const navbar = document.getElementById('navbar');
    addEventListener('scroll', () => navbar.classList.toggle('scrolled', scrollY > 50), { passive: true });

    // ── Reveal on scroll ──
    const io = new IntersectionObserver(entries => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 70);
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));

    // ── Substack feed (graceful fallback to static items) ──
    (function feed() {
      const FEED = '{{SUBSTACK_FEED}}';
      const PROXY = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(FEED);
      const list = document.getElementById('substack-posts');
      if (!list || !FEED) return;
      fetch(PROXY)
        .then(r => { if (!r.ok) throw 0; return r.text(); })
        .then(xml => {
          const items = new DOMParser().parseFromString(xml, 'text/xml').querySelectorAll('item');
          if (!items.length) return;
          list.innerHTML = '';
          [...items].slice(0, 4).forEach(it => {
            const t = it.querySelector('title')?.textContent || '';
            const l = it.querySelector('link')?.textContent || '#';
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = l; a.target = '_blank'; a.rel = 'noopener'; a.textContent = t;
            li.appendChild(a); list.appendChild(li);
          });
        })
        .catch(() => {}); // keep static fallback
    })();

    // ── Smooth anchors ──
    document.querySelectorAll('a[href^="#"]').forEach(a => {
      a.addEventListener('click', e => {
        const t = document.querySelector(a.getAttribute('href'));
        if (t) { e.preventDefault(); t.scrollIntoView({ behavior: 'smooth' }); }
      });
    });

    const yr = document.getElementById('yr');
    if (yr) yr.textContent = new Date().getFullYear();
  </script>

</body>
</html>
